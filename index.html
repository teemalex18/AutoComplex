<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Запись на автомойку</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #888);
      --btn: var(--tg-theme-button-color, #2ea6ff);
      --btn-text: var(--tg-theme-button-text-color, #fff);
      --card: var(--tg-theme-secondary-bg-color, #f3f4f6);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); padding: 16px; font-size: 16px;
    }
    h1 { font-size: 18px; margin: 4px 0 16px; }
    h2 { font-size: 15px; margin: 18px 0 8px; color: var(--hint); font-weight: 600; }
    .grid { display: grid; gap: 8px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .chip {
      background: var(--card); border: 2px solid transparent; border-radius: 12px;
      padding: 12px 8px; text-align: center; cursor: pointer; line-height: 1.25;
      transition: border-color .15s;
    }
    .chip small { display: block; color: var(--hint); font-size: 12px; margin-top: 2px; }
    .chip.active { border-color: var(--btn); }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: var(--hint); margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc;
      background: var(--bg); color: var(--text); font-size: 16px;
    }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: var(--btn); color: var(--btn-text); font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .btn:disabled { opacity: .5; }
    .muted { color: var(--hint); font-size: 14px; }
    .hidden { display: none; }
    .summary { background: var(--card); border-radius: 12px; padding: 14px; line-height: 1.6; }
    .summary b { font-weight: 600; }
    .center { text-align: center; padding: 24px 8px; }
    .ok-icon { font-size: 44px; }
    .banner {
      background: #fff7e6; color: #8a6d00; border-radius: 12px;
      padding: 10px 12px; font-size: 14px; margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div id="reschedule-banner" class="banner hidden">Перенос записи: выберите новые дату и время. Старая запись будет отменена.</div>

  <!-- Шаг 1+2: дата, услуга, время -->
  <div id="step-select">
    <h1 id="title">Запись на автомойку</h1>

    <h2>Дата</h2>
    <div id="dates" class="grid grid-4"></div>

    <h2>Услуга</h2>
    <div id="services" class="grid"></div>

    <h2>Время</h2>
    <div id="slots" class="grid grid-4"></div>
    <p id="slots-hint" class="muted"></p>

    <button id="to-form" class="btn" disabled>Продолжить</button>
  </div>

  <!-- Шаг 3: данные -->
  <div id="step-form" class="hidden">
    <h1>Ваши данные</h1>
    <div class="field"><label>Марка автомобиля</label><input id="brand" placeholder="Напр. Toyota Camry"></div>
    <div class="field"><label>Госномер</label><input id="plate" placeholder="А123ВС777"></div>
    <div class="field"><label>Телефон</label><input id="phone" type="tel" placeholder="+7 999 123-45-67"></div>
    <button id="submit" class="btn">Подтвердить запись</button>
    <button id="back" class="btn" style="background:var(--card);color:var(--text);margin-top:8px;">Назад</button>
  </div>

  <!-- Шаг 4: готово -->
  <div id="step-done" class="hidden center">
    <div class="ok-icon">✅</div>
    <h1>Готово!</h1>
    <div id="done-summary" class="summary" style="text-align:left;margin-top:12px;"></div>
    <p class="muted" style="margin-top:12px;">Подтверждение отправлено в чат с ботом.</p>
    <button id="close" class="btn">Закрыть</button>
  </div>

<script>
  // ===== НАСТРОЙКА: вставьте URL вашего Apps Script Web App (/exec) =====
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLyP5R3uqX2HC2K82neifEnZ4cP68e6E6JM2TtPZDBDxTzXAsQjV50JjI2GfPoVTFH/exec';

  var tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  var state = { date: null, service: null, time: null, rescheduleOf: null };

  // параметр переноса из URL (?reschedule=ID)
  var params = new URLSearchParams(location.search);
  state.rescheduleOf = params.get('reschedule');

  var el = function (id) { return document.getElementById(id); };

  function api(query) { // GET
    return fetch(APPS_SCRIPT_URL + '?' + query).then(function (r) { return r.json(); });
  }
  function post(payload) { // POST text/plain (без preflight)
    return fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).then(function (r) { return r.json(); });
  }

  var cfg = null;

  function init() {
    if (state.rescheduleOf) el('reschedule-banner').classList.remove('hidden');
    api('action=getConfig').then(function (res) {
      if (!res.ok) { alert('Ошибка загрузки настроек'); return; }
      cfg = res;
      el('title').textContent = 'Запись · ' + res.washName;
      renderDates(res.dates);
      renderServices(res.services);
    }).catch(function () { alert('Нет связи с сервером'); });
  }

  function renderDates(dates) {
    var box = el('dates'); box.innerHTML = '';
    var weekday = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    dates.forEach(function (d) {
      var p = d.split('.'); // ДД.ММ.ГГГГ
      var jsDate = new Date(p[2], p[1] - 1, p[0]);
      var chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = '<b>' + p[0] + '.' + p[1] + '</b><small>' + weekday[jsDate.getDay()] + '</small>';
      chip.onclick = function () { selectDate(d, chip); };
      box.appendChild(chip);
    });
  }

  function renderServices(services) {
    var box = el('services'); box.innerHTML = '';
    services.forEach(function (s) {
      var chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = s.name + '<small>' + s.duration + ' мин</small>';
      chip.onclick = function () { selectService(s.id, chip); };
      box.appendChild(chip);
    });
  }

  function clearActive(containerId) {
    Array.prototype.forEach.call(el(containerId).children, function (c) { c.classList.remove('active'); });
  }

  function selectDate(d, chip) {
    state.date = d; state.time = null;
    clearActive('dates'); chip.classList.add('active');
    loadSlots();
  }
  function selectService(id, chip) {
    state.service = id; state.time = null;
    clearActive('services'); chip.classList.add('active');
    loadSlots();
  }

  function loadSlots() {
    el('slots').innerHTML = '';
    el('slots-hint').textContent = '';
    el('to-form').disabled = true;
    if (!state.date || !state.service) { el('slots-hint').textContent = 'Выберите дату и услугу.'; return; }
    el('slots-hint').textContent = 'Загрузка…';
    api('action=getSlots&date=' + encodeURIComponent(state.date) + '&service=' + encodeURIComponent(state.service))
      .then(function (res) {
        if (!res.ok || !res.slots.length) { el('slots-hint').textContent = 'На этот день свободного времени нет.'; return; }
        el('slots-hint').textContent = '';
        res.slots.forEach(function (t) {
          var chip = document.createElement('div');
          chip.className = 'chip'; chip.textContent = t;
          chip.onclick = function () { selectTime(t, chip); };
          el('slots').appendChild(chip);
        });
      });
  }

  function selectTime(t, chip) {
    state.time = t;
    clearActive('slots'); chip.classList.add('active');
    el('to-form').disabled = false;
  }

  el('to-form').onclick = function () { show('step-form'); };
  el('back').onclick = function () { show('step-select'); };

  el('submit').onclick = function () {
    var brand = el('brand').value.trim();
    var plate = el('plate').value.trim();
    var phone = el('phone').value.trim();
    if (!brand || !plate || !phone) { alert('Заполните все поля.'); return; }

    var u = (tg.initDataUnsafe && tg.initDataUnsafe.user) || {};
    el('submit').disabled = true; el('submit').textContent = 'Сохраняем…';

    post({
      action: 'createBooking',
      date: state.date, service: state.service, time: state.time,
      car_brand: brand, plate_number: plate, phone: phone,
      telegram_id: u.id ? String(u.id) : '',
      telegram_username: u.username || '',
      initData: tg.initData || '',
      reschedule_of: state.rescheduleOf || ''
    }).then(function (res) {
      el('submit').disabled = false; el('submit').textContent = 'Подтвердить запись';
      if (!res.ok) { alert(res.error || 'Не удалось записаться'); loadSlots(); return; }
      var b = res.booking;
      el('done-summary').innerHTML =
        '📅 Дата: <b>' + b.date + '</b><br>🕒 Время: <b>' + b.start + '</b><br>'
        + '🧼 ' + b.serviceName + '<br>🚙 ' + b.brand + '<br>🔢 ' + b.plate;
      show('step-done');
    }).catch(function () {
      el('submit').disabled = false; el('submit').textContent = 'Подтвердить запись';
      alert('Нет связи с сервером.');
    });
  };

  el('close').onclick = function () { tg.close(); };

  function show(id) {
    ['step-select', 'step-form', 'step-done'].forEach(function (s) {
      el(s).classList.toggle('hidden', s !== id);
    });
    window.scrollTo(0, 0);
  }

  init();
</script>
</body>
</html>
